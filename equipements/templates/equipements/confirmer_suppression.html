{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retirer — GestioLab</title>
  <link rel="stylesheet" href="{% static 'css/reset.css' %}">
  <link rel="stylesheet" href="{% static 'css/modules.css' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&family=Manrope:wght@200..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
</head>
<body>
<header class="header">
  <a href="#" class="header-brand">⬡ GestioLab</a>
  <div class="header-right">
    <a href="{% url 'logout' %}" class="btn btn-outline btn-sm">Déconnexion</a>
  </div>
</header>
<div class="page-wrapper">
  <div class="confirm-card">
    <div class="confirm-icon">⚠️</div>
    <h2>Retirer cet {{ type }} ?</h2>
    <p>
      Vous êtes sur le point de retirer <strong>« {{ objet }} »</strong>.<br>
      Il ne sera plus visible dans la liste mais restera dans la base de données.
    </p>
    <div class="confirm-actions">
      <a href="javascript:history.back()" class="btn btn-outline">Annuler</a>
      <form method="POST" style="display:inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Oui, retirer</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
